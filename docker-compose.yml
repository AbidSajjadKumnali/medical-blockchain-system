version: "3.9"

services:
  medchain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medchain-emr
    ports:
      - "8501:8501"
    volumes:
      # Persist data directories between container restarts
      - medchain_data:/app/data
      - medchain_static:/app/static
    env_file:
      - .env
    environment:
      - DB_PATH=data/database.db
      - BLOCKCHAIN_PATH=data/blockchain.json
      - UPLOADS_PATH=data/uploads
      - LOGS_PATH=data/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  medchain_data:
    driver: local
  medchain_static:
    driver: local
